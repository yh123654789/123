<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能助手 - 杨泓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f7f8fc;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            margin-bottom: 8px;
        }

        .header .author {
            font-size: 15px;
            opacity: 0.95;
        }

        .chat-box {
            height: 550px;
            padding: 24px;
            overflow-y: auto;
            background: #fdfdfd;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
        }

        .user {
            justify-content: flex-end;
        }

        .bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
        }

        .user .bubble {
            background: #4f46e5;
            color: white;
        }

        .bot .bubble {
            background: #f1f5f9;
            color: #1e293b;
        }

        .input-area {
            display: flex;
            padding: 16px 24px;
            gap: 12px;
            border-top: 1px solid #eee;
        }

        #input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
        }

        #send {
            padding: 14px 24px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 500;
        }

        #send:hover {
            background: #4338ca;
        }

        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🌐 AI 智能对话助手</h1>
            <p class="author">开发者：杨泓 | 基于通义千问大模型</p>
        </div>

        <div class="chat-box" id="chat"></div>

        <div class="input-area">
            <input id="input" placeholder="请输入你的问题..." autocomplete="off">
            <button id="send">发送</button>
        </div>
    </div>

    <script>
        const API_KEY = "sk-2d65424d380742179c5a8e5571f72123"; // 免费公开KEY
        const chat = document.getElementById("chat");
        const input = document.getElementById("input");
        const send = document.getElementById("send");

        function addMsg(text, isUser = false) {
            const div = document.createElement("div");
            div.className = isUser ? "message user" : "message bot";
            div.innerHTML = `<div class="bubble">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMsg() {
            const text = input.value.trim();
            if (!text) return;
            addMsg(text, true);
            input.value = "";

            const loading = document.createElement("div");
            loading.className = "message bot";
            loading.innerHTML = `<div class="bubble loading">思考中...</div>`;
            chat.appendChild(loading);

            try {
                const res = await fetch("https://chatapi.akide.top/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "qwen-turbo",
                        messages: [{ role: "user", content: text }],
                        temperature: 0.7
                    })
                });

                const data = await res.json();
                chat.removeChild(loading);
                addMsg(data.choices[0].message.content);
            } catch (err) {
                chat.removeChild(loading);
                addMsg("AI 服务暂时不可用，请稍后再试~");
            }
        }

        send.onclick = sendMsg;
        input.onkeydown = e => e.key === "Enter" && sendMsg();

        window.onload = () => {
            addMsg("你好杨泓！我是你的AI智能助手，有什么可以帮你？");
        };
    </script>
</body>
</html>
