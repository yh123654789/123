<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI前沿对话项目 | 杨泓</title>
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;}
        body {background: #1a1a2e;color: #eee;font-family: "微软雅黑",sans-serif;}
        .container {max-width: 850px;margin: 30px auto;background: #16213e;border-radius: 16px;overflow: hidden;}
        .top {padding: 20px;text-align: center;background: #0f3460;}
        .top h1 {font-size: 24px;margin-bottom: 6px;}
        .top p {color: #a8dadc;}
        .chat {height: 500px;padding: 20px;overflow-y: auto;}
        .user {text-align: right;margin: 15px 0;}
        .ai {text-align: left;margin: 15px 0;}
        .u-box {display: inline-block;background: #0092ca;padding: 10px 16px;border-radius: 15px 15px 2px 15px;max-width: 75%;}
        .a-box {display: inline-block;background: #224268;padding: 10px 16px;border-radius: 15px 15px 15px 2px;max-width: 75%;}
        .input-area {display: flex;padding: 15px;background: #0f3460;gap: 10px;}
        #msg {flex: 1;padding: 12px;border-radius: 20px;border: none;outline: none;}
        #send {width: 80px;border-radius: 20px;border: none;background: #0092ca;color: #fff;cursor: pointer;}
    </style>
</head>
<body>
<div class="container">
    <div class="top">
        <h1>AI大模型智能对话系统</h1>
        <p>开发者：杨泓 | 前沿AI开源模型 · GitHub部署</p>
    </div>
    <div class="chat" id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="msg" placeholder="输入内容，发送给AI...">
        <button id="send" onclick="chatAI()">发送</button>
    </div>
</div>

<script>
// 免费稳定可跨域 AI接口 真实响应
async function chatAI(){
    let text = document.getElementById('msg').value.trim();
    if(!text) return;

    // 用户消息
    chatBox.innerHTML += `<div class="user"><div class="u-box">${text}</div></div>`;
    document.getElementById('msg').value = '';

    // 加载提示
    let load = `<div class="ai"><div class="a-box">AI正在生成回答...</div></div>`;
    chatBox.innerHTML += load;
    chatBox.scrollTop = chatBox.scrollHeight;

    // 真实AI请求
    let res = await fetch("https://free.v36.cm/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            model:"gpt-3.5-turbo",
            messages:[{"role":"user","content":text}],
            temperature:0.6
        })
    });

    let data = await res.json();
    // 删掉加载
    chatBox.removeChild(chatBox.lastElementChild);
    // AI回复
    let ans = data.choices[0].message.content;
    chatBox.innerHTML += `<div class="ai"><div class="a-box">${ans}</div></div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
