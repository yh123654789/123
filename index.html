<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI智能助手 - 杨泓</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .student-info {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
        }
        .settings {
            padding: 15px 20px;
            background: #f8f9fa;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e0e0e0;
        }
        .setting {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .setting label {
            font-size: 14px;
            font-weight: 500;
        }
        .setting input, .setting select {
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message .content {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-break: break-word;
        }
        .message.user .content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 5px;
        }
        .message.assistant .content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 5px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .input-area {
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e0e0e0;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #667eea;
        }
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: transform 0.2s;
        }
        .input-area button:hover {
            transform: scale(1.02);
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .temp-value {
            min-width: 35px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 头部：学号+姓名 -->
    <div class="header">
        <div>🤖 AI 智能助手</div>
        <div class="student-info">📚 杨泓 | 学号 423240639</div>
    </div>

    <!-- 参数调节面板 -->
    <div class="settings">
        <div class="setting">
            <label>🌡️ 温度:</label>
            <input type="range" id="temperature" min="0" max="1.5" step="0.1" value="0.7">
            <span class="temp-value" id="tempValue">0.7</span>
        </div>
        <div class="setting">
            <label>🤖 模型:</label>
            <select id="model">
                <option value="deepseek-chat">DeepSeek-V3 (推荐)</option>
                <option value="deepseek-reasoner">DeepSeek-R1 (深度推理)</option>
            </select>
        </div>
        <div class="setting">
            <label>📏 最大长度:</label>
            <input type="number" id="maxTokens" value="2000" step="100" min="100" max="4000">
        </div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-area" id="chatArea">
        <div class="message assistant">
            <div class="avatar">🤖</div>
            <div class="content">你好！我是AI助手，有什么可以帮你的吗？</div>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">发送 ✨</button>
    </div>
</div>

<script>
    // ============= API配置（已填入你的密钥） =============
    const USE_MOCK = true;  // 真实AI模式
    const API_KEY = "sk-dd92d2fc2b24497cb2d20e045cdee93d";  // 你的密钥已填好
    // ==================================================
    
    const API_URL = "https://api.deepseek.com/v1/chat/completions";
    
    // DOM元素
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const temperatureSlider = document.getElementById('temperature');
    const tempValue = document.getElementById('tempValue');
    const modelSelect = document.getElementById('model');
    const maxTokensInput = document.getElementById('maxTokens');
    
    temperatureSlider.oninput = () => tempValue.textContent = temperatureSlider.value;
    
    let messages = [{ role: "system", content: "你是一个专业、友好的AI助手。" }];
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function addMessage(content, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        const avatar = role === 'user' ? '👤' : '🤖';
        div.innerHTML = `
            <div class="avatar">${avatar}</div>
            <div class="content">${escapeHtml(content)}</div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        messages.push({ role: role, content: content });
    }
    
    function setLoading(isLoading) {
        sendBtn.disabled = isLoading;
        sendBtn.textContent = isLoading ? '🤔 AI思考中...' : '发送 ✨';
        userInput.disabled = isLoading;
    }
    
    // 真实DeepSeek API调用
    async function realDeepSeekAPI(userMessage) {
        const requestData = {
            model: modelSelect.value,
            messages: messages,
            temperature: parseFloat(temperatureSlider.value),
            max_tokens: parseInt(maxTokensInput.value),
            stream: false
        };
        
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify(requestData)
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            if (response.status === 401) {
                throw new Error('API密钥无效，请检查是否正确填写');
            } else if (response.status === 429) {
                throw new Error('请求太频繁，请稍后再试');
            } else {
                throw new Error(`API错误(${response.status}): ${errorText}`);
            }
        }
        
        const data = await response.json();
        return data.choices[0].message.content;
    }
    
    async function sendMessage() {
        const userMsg = userInput.value.trim();
        if (!userMsg) return;
        
        userInput.value = '';
        addMessage(userMsg, 'user');
        setLoading(true);
        
        try {
            const reply = await realDeepSeekAPI(userMsg);
            addMessage(reply, 'assistant');
        } catch (error) {
            console.error('错误:', error);
            addMessage(`❌ 出错了：${error.message}`, 'assistant');
        } finally {
            setLoading(false);
        }
    }
    
    window.sendMessage = sendMessage;
    
    console.log('AI助手已启动 - 开发者：杨泓 423240639');
    console.log('当前：真实DeepSeek AI模式');
</script>
</body>
</html>
