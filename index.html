<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手 - 杨泓</title>
    <!-- 引入 Tailwind CSS 用于美观的样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* 简单的打字机光标动画 */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-start infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col">
    <div id="app" class="h-full flex flex-col max-w-4xl mx-auto w-full">
        
        <!-- 顶部导航栏：显示姓名和学号 -->
        <header class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800 rounded-b-xl shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-xl">🤖</div>
                <div>
                    <h1 class="font-bold text-lg">AI 智能对话助手</h1>
                    <p class="text-xs text-gray-400">基于前沿大语言模型接口</p>
                </div>
            </div>
            <!-- 你的个人信息展示 -->
            <div class="text-right">
                <p class="text-sm font-semibold text-blue-400">姓名：杨泓</p>
                <p class="text-xs text-gray-400">学号：423240639</p>
            </div>
        </header>

        <!-- 聊天内容展示区 -->
        <main class="flex-1 overflow-y-auto p-4 space-y-4" ref="chatContainer">
            <div v-for="(msg, index) in messages" :key="index" 
                 :class="['flex', msg.role === 'user' ? 'justify-end' : 'justify-start']">
                <div :class="['max-w-[80%] p-3 rounded-xl text-sm', 
                             msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-200']">
                    <p :class="{'typing-cursor': msg.isTyping}">{{ msg.content }}</p>
                </div>
            </div>
        </main>

        <!-- 底部输入框 -->
        <footer class="p-4 bg-gray-800 rounded-t-xl">
            <div class="flex gap-2">
                <input v-model="inputMessage" @keyup.enter="sendMessage"
                       type="text" placeholder="输入你想问 AI 的问题..." 
                       class="flex-1 bg-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="sendMessage" :disabled="isLoading"
                        class="bg-blue-600 hover:bg-blue-500 disabled:bg-gray-600 px-6 py-3 rounded-lg font-medium transition">
                    {{ isLoading ? '思考中...' : '发送' }}
                </button>
            </div>
        </footer>

    </div>

    <!-- 引入我们的逻辑代码 -->
    <script src="main.js"></script>
</body>
</html>
